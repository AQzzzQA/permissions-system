services:
  backend:
    build: ./backend
    container_name: openclaw-permissions-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 667788..!!
      DB_NAME: openclaw_permissions
      JWT_SECRET: your_jwt_secret_key_here_change_this_in_production
      JWT_EXPIRES_IN: 24h
      CORS_ORIGIN: http://localhost:3000
      SUPERADMIN_EMAIL: admin@openclaw.ai
      SUPERADMIN_PASSWORD: SuperAdmin123!
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/admin/api
    container_name: openclaw-permissions-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=/admin/api
